# =============================================================================
# docker-compose.yml — Laravel Web App (VPS)
# =============================================================================
# Jalankan:  docker compose up -d
# Stop:     docker compose down
# Logs:     docker compose logs -f laravel
# Seed DB:  docker compose exec laravel php artisan db:seed
# =============================================================================

services:
  # ── Laravel PHP-FPM ──
  laravel:
    build: .
    container_name: npkpadi-laravel
    restart: unless-stopped
    volumes:
      - laravel-storage:/var/www/html/storage/app/public
      - laravel-db:/var/www/html/database
      - ./.env:/var/www/html/.env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
    depends_on: []
    networks:
      - npkpadi-net

  # ── Nginx Web Server ──
  nginx:
    image: nginx:1.25-alpine
    container_name: npkpadi-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - laravel-storage:/var/www/html/storage/app/public:ro
    depends_on:
      - laravel
    networks:
      - npkpadi-net

volumes:
  laravel-storage:
  laravel-db:

networks:
  npkpadi-net:
    driver: bridge
