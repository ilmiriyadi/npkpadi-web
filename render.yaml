# render.yaml — Render.com Blueprint
# Dokumentasi: https://render.com/docs/blueprint-spec
#
# File ini OPSIONAL — bisa juga konfigurasi manual di Render dashboard.
# Kalau mau pakai file ini: simpan di root repo atau subfolder,
# lalu pilih "Blueprint" saat buat service baru di Render.

services:
  # ── Web Service (Laravel) ──────────────────────────────────────────────
  - type: web
    name: npkpadi-web
    runtime: docker
    # Root directory relatif terhadap root repo
    rootDir: sistem_web/npkpadi
    dockerfilePath: ./Dockerfile.render
    plan: free          # ganti ke "starter" dst jika butuh lebih
    region: singapore   # pilih region terdekat
    healthCheckPath: /api/health

    envVars:
      - key: APP_NAME
        value: "NPK Padi"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        # Render auto-set tapi bisa override
        fromService:
          type: web
          name: npkpadi-web
          property: host
      - key: APP_KEY
        generateValue: true   # Render generate random value
      - key: DATABASE_URL
        fromDatabase:
          name: npkpadi-db
          property: connectionString
      - key: SYNC_API_TOKEN
        sync: false           # Isi manual di Render dashboard (rahasia)
      - key: SYNC_PI_USER_ID
        value: "1"

  # ── PostgreSQL Database ────────────────────────────────────────────────
databases:
  - name: npkpadi-db
    plan: free
    region: singapore
    databaseName: npkpadi
    user: npkpadi
